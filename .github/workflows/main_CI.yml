name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Compile test automation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Amazon Corretto 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "17"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Compile test sources
        run: ./mvnw --batch-mode --no-transfer-progress test-compile -DskipTests

  web-smoke:
    name: Run Chrome headless smoke
    needs: compile
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Amazon Corretto 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "17"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run real web smoke
        run: >-
          ./mvnw --batch-mode --no-transfer-progress clean test
          -Dtest=RunTests
          "-Dcucumber.filter.tags=@smoke"
          -Dbrowser=chrome
          -DexecutionMode=local
          -Dheadless

      - name: Upload test reports and failure evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-results-${{ github.run_attempt }}
          path: |
            target/cucumber/
            target/cucumber-reports/
            target/cucumber-html-reports/
            target/surefire-reports/
            target/evidence/
          if-no-files-found: warn
          retention-days: 14
